</head>

<!----------------------------cabeçalho --------------------------------->
<header class="header">
  <a href="/publico/index.html">LIGA-ATS</a>

  <nav>
    <ul class="menu">

      <li class="dropdown">
        <button class="dropbtn">SOBRE ▾</button>
        <ul class="submenu">
        <li><a href="/publico/pages/sobrenos.html#liga">LIGA</a></li>
        <li><a href="/publico/pages/sobrenos.html#geesfar">GETASF</a></li>
        </ul>
      </li>

      <li class="dropdown">
        <button class="dropbtn">PUBLICAÇÕES ▾</button>

          <li><a href="./pages/artigos.html">Artigos</a></li>

      </li>

      <li><a href="#">CONTATOS</a></li>

    </ul>
  </nav>
</header>





<div class="faixa-titulo">
  <h1>Artigos Acadêmicos</h1>
</div>

<main class="artigos-container" id="artigos-container">
  <!-- aqui NÃO tem section nenhuma -->
</main>

<template id="template-artigo">
  <section class="artigo-card">

    <div class="artigo-lateral">
      <img src="" alt="">
      <a class="btn-pdf" href="" download>Baixar PDF</a>
    </div>

    <div class="artigo-conteudo">
      <h2></h2>
      <p class="descricao"></p>
    </div>

  </section>
</template>


<!----------------------------SEÇÃO FOOTER------------------------------------>


<footer class="footer">

  <div class="footer-main">

    <!-- COLUNA 1: LOGO ESQUERDA -->
    <div class="footer-col footer-left">

      <img src="./img/logo-liga.png" alt="Logo da Liga" class="footer-logo">

      <div class="footer-image-box">
        <img src="./img/im-footer.png" alt="Imagem institucional da Liga">
      </div>

      <p class="footer-address">
        Cidade Universitária Macaé – UFRJ
      </p>

    </div>

    <!-- COLUNA 2: VAZIA -->
    <div class="footer-spacer"></div>

    <!-- COLUNA 3: VAZIA -->
    <div class="footer-spacer"></div>

    <!-- COLUNA 4: CONTATOS -->
    <div class="footer-col footer-contacts">

      <p class="footer-title">Contato</p>

      <div class="contact-item">Email: contato@ligaats.com</div>
      <div class="contact-item">Instagram: @liga.ats</div>
      <div class="contact-item">WhatsApp: (00) 00000-0000</div>

    </div>

    <!-- COLUNA 5: LOGOS DIREITA -->
    <div class="footer-col footer-right-logos">

      <img src="/publico/assets/data/img/faetec.png" alt="Logo da FAETEC" class="footer-logo-small">
      <img src="/publico/assets/data/img/ufrj.png" alt="Logo da UFRJ" class="footer-logo-small">

    </div>

  </div>

  <div class="footer-bottom">
    © Todos os direitos reservados — Pedro Lucas Cosmo Vieira
  </div>

</footer>

<script>
  fetch("/publico/assets/data/dados.json")
    .then(res => res.json())
    .then(dados => {

      const container = document.getElementById("artigos-container");
      const template = document.getElementById("template-artigo");

      const primeirosCinco = dados.slice(0, 5);

      primeirosCinco.forEach(artigo => {

        const clone = template.content.cloneNode(true);

        const img = clone.querySelector("img");
        const h2 = clone.querySelector("h2");
        const p = clone.querySelector(".descricao");
        const link = clone.querySelector(".btn-pdf");

        img.src = artigo.imagem;
        img.alt = artigo.titulo || "Imagem do artigo";

        h2.textContent = artigo.titulo || artigo.descricaoCurta || "Sem título";
        p.textContent = artigo.descricaoLonga || "Descrição não disponível.";

        link.href = artigo.pdf || "#";

        container.appendChild(clone);
      });

    })
    .catch(err => console.error("Erro ao carregar artigos:", err));
</script>

</body>
</html>
