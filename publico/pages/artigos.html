<!DOCTYPE html>
<html lang="pt-BR">
   <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Artigos</title>
      <link rel="stylesheet" href="/assets/css/includes.css">
      <link rel="stylesheet" href="/assets/css/pages.css">
   </head>
   <body class="artigos">
     <!----------------------------cabeçalho (include) --------------------------------->
    <div data-include="/includes/header.html"></div>


      <div class="faixa-titulo">
         <h1>Artigos Acadêmicos</h1>
      </div>


      <main class="artigos-container" id="artigos-container">
         <!-- aqui NÃO tem section nenhuma --> 
      </main>

<nav class="artigos-paginacao" aria-label="Paginação de artigos">
  <button class="pg-seta is-disabled" type="button" disabled aria-label="Página anterior">
    ‹
  </button>

  <div class="pg-bolinhas">
    <button class="pg-bolinha is-active" type="button" aria-current="page" aria-label="Página 1"></button>
    <button class="pg-bolinha" type="button" aria-label="Página 2"></button>
    <button class="pg-bolinha" type="button" aria-label="Página 3"></button>
    <button class="pg-bolinha" type="button" aria-label="Página 4"></button>
  </div>

  <button class="pg-seta" type="button" aria-label="Próxima página">
    ›
  </button>
</nav>

   <template id="template-artigo">
  <section class="artigo-card">

    <div class="artigo-lateral">
      <img src="" alt="">
      <a class="btn-pdf" href="" download>Baixar PDF</a>
    </div>

    <div class="artigo-conteudo">
      <h2></h2>
      <p class="descricao"></p>

      <div class="artigo-rodape">
        <div class="meta">
          <span class="autor"></span>
          <span class="tags"></span>
        </div>

        <button class="btn-detalhe">Ler mais</button>
      </div>
    </div>

  </section>
</template>




      <!----------------------------SEÇÃO FOOTER (include)------------------------------------>
      <div data-include="/includes/footer.html"></div>

      <script src="/assets/js/include-partials.js"></script>

<script>
fetch("/assets/data/dados.json")
  .then(res => res.json())
  .then(dados => {

    const container = document.getElementById("artigos-container");
    const template = document.getElementById("template-artigo");
    const paginacao = document.querySelector(".artigos-paginacao");
    const bolinhas = paginacao ? paginacao.querySelector(".pg-bolinhas") : null;
    const setas = paginacao ? paginacao.querySelectorAll(".pg-seta") : [];
    const setaAnterior = setas[0] || null;
    const setaProxima = setas[1] || null;
    const porPagina = 10;
    const totalPaginas = Math.max(1, Math.ceil(dados.length / porPagina));
    const params = new URLSearchParams(window.location.search);
    let paginaAtual = Number.parseInt(params.get("page") || "1", 10);

    if (Number.isNaN(paginaAtual) || paginaAtual < 1) {
      paginaAtual = 1;
    }
    if (paginaAtual > totalPaginas) {
      paginaAtual = totalPaginas;
    }

    if (!container || !template) return;

    const atualizarUrl = (pagina) => {
      const novaUrl = new URL(window.location.href);
      novaUrl.searchParams.set("page", String(pagina));
      window.history.replaceState({}, "", novaUrl.toString());
    };

    const renderBolinhas = () => {
      if (!bolinhas) return;
      bolinhas.innerHTML = "";

      for (let i = 1; i <= totalPaginas; i += 1) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = `pg-bolinha${i === paginaAtual ? " is-active" : ""}`;
        btn.setAttribute("aria-label", `Pagina ${i}`);
        if (i === paginaAtual) {
          btn.setAttribute("aria-current", "page");
        }
        btn.addEventListener("click", () => {
          paginaAtual = i;
          renderPagina();
        });
        bolinhas.appendChild(btn);
      }
    };

    const atualizarSetas = () => {
      if (setaAnterior) {
        const desativar = paginaAtual <= 1;
        setaAnterior.disabled = desativar;
        setaAnterior.classList.toggle("is-disabled", desativar);
      }
      if (setaProxima) {
        const desativar = paginaAtual >= totalPaginas;
        setaProxima.disabled = desativar;
        setaProxima.classList.toggle("is-disabled", desativar);
      }
    };

    const renderPagina = () => {
      container.innerHTML = "";
      atualizarUrl(paginaAtual);

      const inicio = (paginaAtual - 1) * porPagina;
      const fim = inicio + porPagina;

      dados.slice(inicio, fim).forEach(artigo => {

        const clone = template.content.cloneNode(true);

        const img = clone.querySelector("img");
        const h2 = clone.querySelector("h2");
        const p = clone.querySelector(".descricao");
        const linkPdf = clone.querySelector(".btn-pdf");
        const btnDetalhe = clone.querySelector(".btn-detalhe");
        const autorEl = clone.querySelector(".autor");
        const tagsEl = clone.querySelector(".tags");

        if (img) {
          img.src = artigo.imagem || "";
          img.alt = artigo.titulo || "Imagem do artigo";
        }

        if (h2) {
          h2.textContent = artigo.titulo || "Sem t��tulo";
        }

        if (p) {
          p.textContent = artigo.descricaoLonga || "Descri��ǜo nǜo dispon��vel.";
        }

        if (linkPdf) {
          linkPdf.href = artigo.pdf || "#";
        }

        if (autorEl && Array.isArray(artigo.autores)) {
          autorEl.textContent = `Autor(s):  ${artigo.autores.join(", ")}`;
        }

        if (btnDetalhe) {
          btnDetalhe.addEventListener("click", () => {
            window.location.href = `/pages/artigo-template.html?id=${artigo.id}`;
          });
        }

        container.appendChild(clone);
      });

      renderBolinhas();
      atualizarSetas();
    };

    if (setaAnterior) {
      setaAnterior.addEventListener("click", () => {
        if (paginaAtual > 1) {
          paginaAtual -= 1;
          renderPagina();
        }
      });
    }

    if (setaProxima) {
      setaProxima.addEventListener("click", () => {
        if (paginaAtual < totalPaginas) {
          paginaAtual += 1;
          renderPagina();
        }
      });
    }

    renderPagina();

  })
  .catch(err => console.error("Erro ao carregar artigos:", err));
</script>


   </body>
</html>
